appId: com.genflow.app
productName: GenFlow
# electron is hoisted to the workspace root, so electron-builder can't auto-detect it.
electronVersion: 33.4.11
# worker_threads cannot load a script from inside an asar archive, so ship unpacked.
asar: false
directories:
  output: release
  buildResources: build
files:
  - dist-main/**
  - dist-renderer/**
  - package.json
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  artifactName: ${productName}-${version}-${arch}.${ext}
win:
  # `zip` needs no code-signing tooling, so it builds without Administrator /
  # Developer Mode on Windows (nsis/winCodeSign requires symlink privilege).
  # CI overrides this to also build the nsis installer (see desktop-release.yml).
  target:
    - zip
  artifactName: ${productName}-${version}-win-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
  category: Development
